name: beepbridge
description: Scan barcodes and send them to your BeepBridge desktop server.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^6.0.2
  http: ^1.2.2
  shared_preferences: ^2.3.4
  permission_handler: ^11.3.1
  google_mobile_ads: ^5.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
